services:
  nginx:
    image: nginx:alpine
    container_name: cardduel-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - cardduel-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cardduel-api
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - JWT_SIGNING_KEY=${JWT_SIGNING_KEY:-dev-key-minimum-32-characters-long-xxxxxxxxxx}
      - ConnectionStrings__DefaultConnection=Server=postgres;Port=5432;Database=cardduel;User Id=postgres;Password=${DB_PASSWORD:-himym}
      - SignalR__RedisConnectionString=redis:6379
      - SignalR__UseRedisBackplane=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5000:8080"
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/health"]
      interval: 300s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - cardduel-network

  postgres:
    image: postgres:16-alpine
    container_name: cardduel-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=cardduel
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD:-himym}
    volumes:
      - cardduel-postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - cardduel-network

  redis:
    image: redis:7-alpine
    container_name: cardduel-redis
    restart: unless-stopped
    ports:
    - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - cardduel-network

networks:
  cardduel-network:
    driver: bridge

volumes:
  cardduel-postgres-data:
